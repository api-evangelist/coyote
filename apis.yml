aid: coyote
name: Coyote Logistics
description: >
  Coyote Logistics is a global third-party logistics (3PL) provider and freight brokerage
  platform, now part of RXO, offering REST APIs for truckload capacity, less-than-truckload
  (LTL) shipping, freight quoting, shipment tracking, load management, customs brokerage,
  and supply chain visibility. Originally founded in 2006 and acquired by UPS in 2015, Coyote
  was subsequently acquired by RXO in 2024. The CoyoteGO API platform serves both shippers
  and carriers, providing real-time freight quotes, live tracking updates, and load booking
  capabilities. The API uses OAuth 2.0 client credentials flow and is backed by a network
  of 100,000 carriers serving 15,000 customers. Integration is available at no additional
  cost for shippers and carriers working with Coyote, with native connectors to leading
  TMS, WMS, and ERP systems.
