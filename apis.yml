apis:

  - aid: coyote:coyotego-api
    name: CoyoteGO API
    description: >
      The primary REST API for Coyote Logistics enabling shippers and carriers to integrate
      freight operations directly into their TMS, WMS, ERP, or accounting systems. Provides
      real-time freight quotes for truckload and LTL shipments, live shipment tracking updates,
      load search and booking for carriers, shipment data management, bill of lading generation,
      billing and invoice retrieval, and document submission. Authentication uses OAuth 2.0
      client credentials flow; credentials are provisioned by a Coyote sales representative
      or the integrations team. A sandbox environment is available at api-sandbox.coyote.com
      for testing before going live.
    humanURL: https://api2-dev.coyote.com/
    baseURL: https://api.coyote.com
